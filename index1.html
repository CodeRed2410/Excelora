<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excelora</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #000 0%, rgba(10,35,66,0.85) 50%, rgba(10,35,66,0.4) 70%, rgba(10,35,66,0.0) 80%),
                        linear-gradient(225deg, #123a6d 0%, rgba(18,58,109,0.75) 40%, rgba(18,58,109,0.25) 70%, rgba(18,58,109,0.0) 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }

        .welcome-message {
            flex: 1;
            color: rgb(104, 213, 184);
            animation: slideInFade 1.5s ease-out;
        }

        .welcome-message h1 {
            font-size: clamp(24px, 5vw, 36px);
            margin: 0;
            font-weight: 700;
            animation: slideInLeft 1s ease-out 0.3s both;
        }

        .welcome-message p {
            font-size: clamp(14px, 3vw, 18px);
            margin-top: 8px;
            font-style: italic;
            overflow: hidden;
            border-right: 2px solid rgb(104, 213, 184);
            white-space: nowrap;
            animation: typewriter 2s steps(26) 1.5s both, blink 1s infinite 3.5s;
        }

        .center-container {
            flex: 0 0 auto;
            width: 100%;
            max-width: 400px;
            padding: 40px 32px 28px 32px;
            background: rgba(255,255,255,0.95);
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(30, 144, 255, 0.18);
            border: 1.5px solid #e3eafc;
        }

        .form-group {
            position: relative;
            margin-bottom: 32px;
            width: 100%;
        }

        .form-group input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #b6c6e6;
            background: none;
            padding: 10px 0 6px 0;
            font-size: 16px;
            color: #1a237e;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: none;
            border-radius: 0;
        }

        .form-group input:focus {
            outline: none;
            border-bottom: 2.5px solid #1976d2;
            background: none;
            box-shadow: none;
        }

        .form-group label {
            position: absolute;
            left: 0;
            top: 12px;
            color: #757575;
            font-size: 16px;
            pointer-events: none;
            background: transparent;
            transition: 0.2s cubic-bezier(.4,0,.2,1);
            padding: 0 2px;
        }

        .form-group input:focus + label,
        .form-group input:not(:placeholder-shown) + label {
            top: -12px;
            left: 0;
            font-size: 13px;
            color: #1976d2;
            background: #fff;
        }

        .form-btn-center {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .form-btn-center button {
            background: linear-gradient(90deg, #1976d2 0%, #64b5f6 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 12px 36px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 2px 8px rgba(25, 118, 210, 0.10);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            min-height: 44px;
        }

        .form-btn-center button:hover {
            background: linear-gradient(90deg, #1565c0 0%, #42a5f5 100%);
            transform: translateY(-2px) scale(1.04);
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 0 0;
            flex-wrap: wrap;
        }

        .links a {
            color: #1976d2;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #0d47a1;
            text-decoration: underline;
        }

        .help-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: linear-gradient(90deg, #43cea2 0%, #185a9d 100%);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(24, 90, 157, 0.10);
            transition: background 0.2s, transform 0.1s;
            z-index: 1001;
        }

        .help-btn:hover {
            background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%);
            transform: translateY(-2px) scale(1.04);
        }

        .support-menu {
            display: none;
            position: fixed;
            top: 60px;
            right: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.13);
            min-width: 180px;
            z-index: 1000;
            padding: 12px 0;
            border: 1.5px solid #e3eafc;
        }

        .support-menu a {
            display: block;
            padding: 10px 24px;
            color: #1976d2;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }

        .support-menu a:hover {
            background: #f0f7ff;
            color: #0d47a1;
        }

        @keyframes typewriter {
            0% {
                width: 0;
            }
            100% {
                width: 40%;
            }
        }

        @keyframes blink {
            0%, 50% {
                border-color: rgb(104, 213, 184);
            }
            51%, 100% {
                border-color: transparent;
            }
        }

        @keyframes slideInFade {
            0% {
                opacity: 0;
                transform: translateX(-30px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-50px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Tablet Styles */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                text-align: center;
                gap: 30px;
            }

            .welcome-message {
                order: 1;
            }

            .center-container {
                order: 2;
                max-width: 100%;
                padding: 30px 24px;
            }

            .links {
                flex-direction: column;
                gap: 10px;
            }
        }

        /* Mobile Styles */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .main-container {
                gap: 20px;
            }

            .center-container {
                padding: 25px 20px;
            }

            .form-group {
                margin-bottom: 25px;
            }

            .form-btn-center button {
                padding: 12px 24px;
                font-size: 16px;
                width: 100%;
            }

            .help-btn {
                top: 15px;
                right: 15px;
                padding: 6px 12px;
                font-size: 14px;
            }

            .support-menu {
                top: 50px;
                right: 15px;
                min-width: 160px;
            }

            .welcome-message p {
                border-right: none;
                animation: slideInLeft 1s ease-out 0.6s both;
            }
        }

        /* Large Screen Optimization */
        @media (min-width: 1200px) {
            .main-container {
                gap: 60px;
            }
        }
    </style>
</head>
<body>
    <button class="help-btn" id="helpBtn">Help</button>
    <div class="support-menu" id="supportMenu">
        <a href="#" id="supportPage">Support Page</a>
        <a href="mailto:omghorpade9009@gmail.com" id="mailSupport">Mail Support</a>
    </div>

    <div class="main-container">
        <div class="welcome-message">
            <h1>Welcome to, Excelora</h1>
            <p>Excellence through learning.</p>
        </div>

        <div class="center-container">
            <form autocomplete="off">
                <div class="form-group">
                    <input type="text" id="uid" name="uid" required placeholder=" " autocomplete="off">
                    <label for="uid">User UID</label>
                </div>
                <div class="form-group">
                    <input type="password" id="pass" name="pass" required placeholder=" " autocomplete="off">
                    <label for="pass">Password</label>
                </div>
                <div class="form-btn-center">
                    <button type="submit">Login</button>
                </div>
            </form>
            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Register</a>
            </div>
        </div>
    </div>

    <script>
        const helpBtn = document.getElementById('helpBtn');
        const supportMenu = document.getElementById('supportMenu');
        const supportPage = document.getElementById('supportPage');

        helpBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            supportMenu.style.display = supportMenu.style.display === 'block' ? 'none' : 'block';
        });

        document.addEventListener('click', function(e) {
            if (!supportMenu.contains(e.target) && e.target !== helpBtn) {
                supportMenu.style.display = 'none';
            }
        });

        supportPage.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'support.html';
        });
    </script>
</body>
</html>
